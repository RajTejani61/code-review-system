# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Code Review System CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # Starts a PostgreSQL database for your tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check for Syntax Errors
        run: |
          # This only catches real bugs (like syntax errors). It will stop the build if found.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Show Style Warnings
        run: |
          flake8 . --exit-zero --max-line-length=127

      - name: Test with pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
          LLM_MODEL_NAME: "test-model"
          SECRET_KEY: "test-secret"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          DB_USERNAME: "test"
          DB_PASSWORD: "testpassword"
          DB_HOST: "localhost"
          DB_NAME: "testdb"
        run: |
          pytest test/
